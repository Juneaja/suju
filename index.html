<!DOCTYPE html>
<html lang="id">
<head>
     
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rujukan Klinik - Simple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c5aa0;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .card { box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: none; border-radius: 15px; }
        .status-badge { font-size: 0.75em; padding: 0.5em 1em; border-radius: 20px; }
        .rujukan-item { transition: all 0.3s; cursor: pointer; }
        .rujukan-item:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .floating-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; 
                       background: var(--primary); color: white; border: none; font-size: 1.5em; 
                       box-shadow: 0 5px 20px rgba(44,90,160,0.4); z-index: 1000; }
        .floating-btn:hover { transform: scale(1.1); background: #1e3d72; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="bg-primary text-white py-4 mb-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-hospital me-3"></i>
                        SISTEM RUJUKAN KL exonerINIK RAWAT INAP
                    </h1>
                    <small>Bridging antar klinik - Simple & Cepat</small>
                </div>
                <div class="col-md-6 text-md-end">
                    <div id="userInfo" class="d-none">
                        <i class="fas fa-user-md me-2"></i>
                        <span id="userName"></span>
                        <button class="btn btn-outline-light btn-sm ms-2" id="btnLogout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                    <button class="btn btn-outline-light btn-sm" id="btnLogin" data-bs-toggle="modal" data-bs-target="#modalLogin">
                        <i class="fas fa-sign-in-alt me-1"></i> Login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        
        <div class="row mb-4" id="statsSection" style="display: none;">
            <div class="col-md-3 mb-3">
                <div class="card text-center bg-success text-white">
                    <div class="card-body">
                        <i class="fas fa-exchange-alt fa-2x mb-2"></i>
                        <h3 id="totalRujukan">0</h3>
                        <small>Total Rujukan</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center bg-info text-white">
                    <div class="card-body">
                        <i class="fas fa-clock fa-2x mb-2"></i>
                        <h3 id="rujukanPending">0</h3>
                        <small>Menunggu</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center bg-warning text-dark">
                    <div class="card-body">
                        <i class="fas fa-check-circle fa-2x mb-2"></i>
                        <h3 id="rujukanDiterima">0</h3>
                        <small>Diterima</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center bg-danger text-white">
                    <div class="card-body">
                        <i class="fas fa-times-circle fa-2x mb-2"></i>
                        <h3 id="rujukanDitolak">0</h3>
                        <small>Ditolak</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Daftar Rujukan -->
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-list me-2"></i>Daftar Rujukan
                </h5>
            </div>
            <div class="card-body">
                <div id="listRujukan" class="row">
                    <div class="col-12">
                        <div class="text-center py-5 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3 opacity-50"></i>
                            <h5>Belum ada data rujukan</h5>
                            <p class="mb-0">Login atau buat rujukan pertama Anda</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- FAB Buat Rujukan -->
    <button class="floating-btn d-none" id="fabBuatRujukan" data-bs-toggle="modal" data-bs-target="#modalBuatRujukan" title="Buat Rujukan Baru">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal Login -->
    <div class="modal fade" id="modalLogin" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        <i class="fas fa-user-md text-primary me-2"></i>Login Dokter
                    </h5>
                </div>
                <div class="modal-body">
                    <form id="formLogin">
                        <div class="mb-3">
                            <label class="form-label">Email / Username</label>
                            <input type="text" class="form-control" id="loginUser" placeholder="dokter@klinik.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPass" placeholder="******" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Masuk
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Buat Rujukan -->
    <div class="modal fade" id="modalBuatRujukan" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title mb-0">
                        <i class="fas fa-plus me-2"></i>Buat Rujukan Baru
                    </h5>
                </div>
                <form id="formRujukan">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">No. RM Pasien <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="rmPasien" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nama Pasien <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="namaPasien" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Klinik Tujuan <span class="text-danger">*</span></label>
                                <select class="form-select" id="klinikTujuan" required>
                                    <option value="">Pilih Klinik...</option>
                                    <option value="Klinik Mitra Sehat">Klinik Mitra Sehat</option>
                                    <option value="Klinik Jaya Medika">Klinik Jaya Medika</option>
                                    <option value="Klinik Harapan Baru">Klinik Harapan Baru</option>
                                    <option value="Klinik Sejahtera">Klinik Sejahtera</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Dokter Penerima</label>
                                <select class="form-select" id="dokterPenerima">
                                    <option value="">Pilih Dokter...</option>
                                    <option value="Dr. Andi Sp.PD">Dr. Andi Sp.PD (Penyakit Dalam)</option>
                                    <option value="Dr. Sari Sp.OG">Dr. Sari Sp.OG (Kandungan)</option>
                                    <option value="Dr. Budi Sp.OT">Dr. Budi Sp.OT (Orthopedi)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Diagnosis</label>
                            <textarea class="form-control" id="diagnosis" rows="2" placeholder="Contoh: Hipertensi stadium 2, Gagal Ginjal Kronis..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Terapi yang sudah diberikan</label>
                            <textarea class="form-control" id="terapi" rows="2" placeholder="Contoh: Amlodipine 5mg, Furosemide 40mg..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Alasan Rujukan <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="alasanRujukan" rows="3" required 
                                      placeholder="Contoh: Perlu rawat inap, Konsultasi spesialis jantung..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-paper-plane me-2"></i>Kirim Rujukan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Detail -->
    <div class="modal fade" id="modalDetail" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailTitle">Detail Rujukan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailContent"></div>
                <div class="modal-footer" id="detailActions"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
